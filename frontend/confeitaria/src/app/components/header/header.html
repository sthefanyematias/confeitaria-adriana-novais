<header class="header" [class.scrolled]="scrolled">
    <div class="container header-inner">

        <a routerLink="/home" class="logo" (click)="fecharMenu()">
            <img src="/images/logo.png" alt="Confeitaria Adriana Novais" class="logo-img">
        </a>

        <nav class="nav" [class.nav-aberta]="menuAberto" role="navigation" aria-label="Menu principal">
            <a routerLink="/home" routerLinkActive="ativo" [routerLinkActiveOptions]="{exact:true}" class="nav-link"
                (click)="fecharMenu()">Inicio</a>
            <a routerLink="/produtos" routerLinkActive="ativo" class="nav-link" (click)="fecharMenu()">Produtos</a>
            <a routerLink="/sobre" routerLinkActive="ativo" class="nav-link" (click)="fecharMenu()">Sobre Adriana</a>
        </nav>

        <div class="header-acoes">
            <a routerLink="/carrinho" class="btn-carrinho" aria-label="Carrinho" (click)="fecharMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <circle cx="9" cy="21" r="1" />
                    <circle cx="20" cy="21" r="1" />
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
                @if (totalItens > 0) {
                <span class="badge">{{ totalItens }}</span>
                }
            </a>

            <button class="btn-hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuAberto"
                aria-label="Abrir ou fechar menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

    </div>
</header>

@if (menuAberto) {
<div class="menu-overlay" (click)="fecharMenu()" aria-hidden="true"></div>
}
