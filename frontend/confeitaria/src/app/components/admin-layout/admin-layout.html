<div class="admin-wrapper">

    @if (sidebarAberta) {
    <div class="overlay-mobile" (click)="fecharSidebar()"></div>
    }

    <aside class="sidebar" [class.sidebar-aberta]="sidebarAberta">

        <div class="sidebar-topo">
            <div class="sidebar-avatar">AN</div>
            <div class="sidebar-marca-wrap">
                <span class="sidebar-marca">Adriana Novais</span>
                <span class="sidebar-subtitulo">Administrador</span>
            </div>
            <button class="btn-fechar-sidebar" (click)="toggleSidebar()" aria-label="Fechar menu">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">

            <span class="nav-secao-titulo">Menu</span>

            <a routerLink="/admin/home" routerLinkActive="nav-ativo" [routerLinkActiveOptions]="{exact:true}"
                class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                <span>Página Inicial</span>
            </a>

            <a routerLink="/admin/produtos" routerLinkActive="nav-ativo" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                <span>Doces / Produtos</span>
            </a>

            <a routerLink="/admin/categorias" routerLinkActive="nav-ativo" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                <span>Categorias</span>
            </a>

            <a routerLink="/admin/pedidos" routerLinkActive="nav-ativo" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg>
                <span>Pedidos / Vendas</span>
            </a>

        </nav>

        <div class="sidebar-rodape">
            <button class="btn-sair" (click)="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                <span>Sair</span>
            </button>
        </div>

    </aside>

    <div class="admin-main" [class.sem-sidebar]="!sidebarAberta">

        <header class="admin-header">
            <button class="btn-menu" (click)="toggleSidebar()" aria-label="Abrir menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>

            <h1 class="header-saudacao">Olá, {{ nomeAdmin }}!</h1>

            <div class="header-acoes">
                <button class="btn-sino" (click)="limparNotificacoes()" aria-label="Notificações">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    @if (notificacoes > 0) {
                    <span class="sino-badge">{{ notificacoes > 9 ? '9+' : notificacoes }}</span>
                    }
                </button>
            </div>
        </header>

        <main class="admin-pagina">
            <ng-content></ng-content>
        </main>
    </div>
</div>
